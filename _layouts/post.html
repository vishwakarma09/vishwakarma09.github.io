---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

</div>

{% if content contains 'class="language-mermaid"' %}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Convert Jekyll kramdown mermaid code blocks to standard <div class="mermaid">
    const codeElements = document.querySelectorAll('code.language-mermaid, div.language-mermaid');
    codeElements.forEach(function(codeEl) {
      let targetToReplace = codeEl;
      
      // If code element is inside a pre, target the pre or outer divs
      if (codeEl.tagName === 'CODE' && codeEl.parentElement && codeEl.parentElement.tagName === 'PRE') {
        targetToReplace = codeEl.parentElement;
        const highlightDiv = targetToReplace.parentElement;
        if (highlightDiv && highlightDiv.classList.contains('highlight')) {
          const rougeDiv = highlightDiv.parentElement;
          if (rougeDiv && rougeDiv.classList.contains('highlighter-rouge')) {
            targetToReplace = rougeDiv;
          } else {
            targetToReplace = highlightDiv;
          }
        }
      }
      
      const div = document.createElement('div');
      div.className = 'mermaid';
      // Use textContent to get clean raw string without HTML entities
      div.textContent = codeEl.textContent || codeEl.innerText;
      targetToReplace.parentNode.replaceChild(div, targetToReplace);
    });
    
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: true, theme: 'default' });
      mermaid.init(undefined, '.mermaid');
    }
  });
</script>
{% endif %}
