---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

</div>

{% if content contains 'class="language-mermaid"' %}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Convert Jekyll kramdown mermaid code blocks to standard <div class="mermaid">
    const containers = document.querySelectorAll('.language-mermaid');
    containers.forEach(function(container) {
      const codeElement = container.querySelector('code');
      if (codeElement) {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = codeElement.innerText;
        container.parentNode.replaceChild(div, container);
      }
    });
    
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: true });
      mermaid.init(undefined, '.mermaid');
    }
  });
</script>
{% endif %}
